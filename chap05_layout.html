<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>chap05_layout</title>
</head>
<body>
<!--
/*
 padding-top, padding-right, padding-bottom, padding-left
 */
 -->
<div style="background-color: #aaa; padding: 50px ; margin : 30px;">이것은 div 입니다.</div>

<div style="background-color: #ef8a8a; padding: 100px 50px 10px 30px;">이것은 div 입니다.</div>

<div style="background-color: #b2ef8a; padding-left: 30px; margin-bottom: 30px;">이것은 div 입니다.</div>

<div style="margin-bottom: 50px;">
    <h3 style="color: #d9543f;">1. content-box (기본값)</h3>
    <div style="width: 200px; height: 100px; padding: 20px; border: 10px solid #333; background-color: #ffcccc;">
        전체 너비 : 260px
    </div>
</div>

<div style="margin-bottom: 50px;">
    <h3 style="color: #d9543f;">2. border-box </h3>
    <div style="box-sizing: border-box; width: 200px; height: 100px; padding: 20px; border: 10px solid #333; background-color: #ffcccc;">
        전체 너비 : 200px
    </div>
</div>

</body>
</html>
