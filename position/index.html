<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Position</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="fixed box">Fixed<br />(우측 하단 고정)</div>

    <div class="content">
        <h1>Position 속성 알아보기</h1>
        <p>스클롤을 내려서 박스들이 어떻게 움직이는지 호가인해보세요!</p>

        <div class="sticky box">Sticky<br />(스크롤시 상단에 붙는 속성)</div>

        <div class="spacer">스크롤을 더내려보세요</div>

        <div class="parent">
            <strong>부모 컨테이너 (Relative)</strong><br />
                이박스는 자식 요소(Absolute)의 '기준점' 역할을 합니다.
            <div class="child box">Absolute<br />(부모를 기준으로 위치)</div>
        </div>
    </div>
</body>
</html>
