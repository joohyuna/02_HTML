<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>애니메이션 연슴</title>
    <link rel="stylesheet" href="style_ex.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>CSS 애니메이션</h1>
        </header>
        <div>
            <h2>1. Transform</h2>
            <hr />
            <p>각 상자에 마우스를 올리면 각기 다른 transform 효과가 적용됩니다.</p>
            <section>
                <div class="card">
                    <h4>Translate</h4>
                    <span class="description">(Move)</span>
                    <div class="translate box">Move Me</div>
                </div>
                <div class="card">
                    <h4>Scale</h4>
                    <span class="description">(Resize)</span>
                    <div class="scale box">Size Me</div>
                </div>
                <div class="card">
                    <h4>Rotate</h4>
                    <span class="description">(Resize)</span>
                    <div class="rotate box">Size Me</div>
                </div>
            </section>
        </div>
    </div>
</body>
</html>
