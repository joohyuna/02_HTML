<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>chap04_background</title>
</head>
<body>
  <div style="
  background-color: #aaa;
  width: 300px;
  height: 300px;
  border: 5px solid #000;
  border-radius: 30px;
"></div>

  <div style="
  background-image: url('images/image.png');
  width: 600px;
  height: 600px;
  background-repeat: no-repeat;
">
      글자를 적습니다.
  </div>

  <div style="
  background-image: url('images/image.png');
  width: 600px;
  height: 300px;
  background-repeat: no-repeat;
  background-size: cover;
  ">
      글자를 적습니다.
  </div>

  <div style="
  background-image: url('images/image.png');
  width: 600px;
  height: 300px;
  background-repeat: no-repeat;
  background-size: contain;
  ">
      글자를 적습니다.
  </div>

  <!--
    배경 이미지 삽입 방식
   cover : 영역을 꽉차게  - 영역 중심 (대부분 커버 방식을 많이 사용)
   contain : 빈공간이 있어도 되니깐 이미지를 전부 보여달라 - 이미지 중심
  -->

  <div style="
  background-image: url('images/image.png');
  width: 600px;
  height: 300px;
  background-repeat: no-repeat;
  background-size: contain;
  background-position: center;
  background-position: 100px 100px;
  ">
      글자를 적습니다.
  </div>
</body>
</html>
