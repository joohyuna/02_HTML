<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>chap06_flex</title>
</head>
<body>
<!--
    flexbox : 정렬을 할 요소 안에 자식 요소를 배치하는 방식
-->
<div style="display: flex;">
    <div style="width: 100px; height: 100px; background-color: red;"></div>
    <div style="width: 100px; height: 100px; background-color: blue;"></div>
    <div style="width: 100px; height: 100px; background-color: orange;"></div>
</div>

<!--
    결국, 큰 영역을 그리고 그 안에 요소를 배치하는 방식임
 -->
<div style=" width: 100%; display: flex; margin-bottom: 50px;">
    <header style="width: 100%; height: 80px; display: flex;">
        <div>로고자리</div>
        <div>메뉴자리</div>
        <div>로그인자리</div>
    </header>
</div>
<!--
전체 화면의 픽셀 : 1800px
margin: 0 auto;
[왼쪽 오른 쪽이 자동으로 margin을 나눠서 가운데 정렬]
-->
<!--
 justify:-content 속성 : 메인 축에 대한 정렬을 뜻함
                        : 기본은 가로 축이 메인임
          flex-start : 시작점부터 정렬
          flex-end : 끝범부터 정렬
          center : 중장에 정렬
          space-between: 끝점부터 정렬
          space-around: 중아을 중심으로 양옆 정렬
 -->
<div style=" width: 100%; display: flex; margin-bottom: 50px; border-bottom: 1px solid #ccc;">
    <header style="width: 100%; max-width: 1200px; margin: 0 auto; height: 80px; display: flex; justify-content: space-between;">
        <div style="background-color: red">로고자리</div>
        <div style="background-color: blue;">메뉴자리</div>
        <div style="background-color: yellow;">로그인자리</div>
    </header>
</div>

<!--
    align-items 속성 : 보조축에 대한 정렬
                     : 기본을 세로 축이 보조임
           flex-start : 시작점부터 정렬
           flex-end : 끝점부터 정렬
           center : 중앙에 정렬
 -->
<div style=" width: 100%; display: flex; margin-bottom: 50px; border-bottom: 1px solid #ccc;">
    <header style="width: 100%; max-width: 1200px; margin: 0 auto; height: 80px; display: flex; justify-content: space-between;">
        <div style="background-color: red; display:flex; align-items: center; font-size: 20px;">로고자리</div>
        <div style="background-color: blue; display:flex; align-items: center; font-size: 30px;">메뉴자리</div>
        <div style="background-color: yellow; display:flex; align-items: center; font-size: 20px;">로그인자리</div>
    </header>
</div>
<!--
flex-grow: 1; 가변형으로 자동으로 크기를 채워줌 변형 1은 비율 1:1 반반
            : 1:2  나누면 1과 2로 나눠 짐
            flex 만 적용해도 자식에게도 높이가 적용이 된다. 가로 정렬을 하고 있을 때
 -->
<div style=" width: 100%; display: flex; margin-bottom: 50px; border-bottom: 1px solid #ccc;">
    <header style="width: 100%; max-width: 1200px; margin: 0 auto; height: 80px; display: flex; justify-content: space-between;">
        <div style="width: 150px; background-color: red; display:flex; align-items: center; font-size: 20px;">로고자리</div>
        <div style="flex-grow: 1; background-color: blue; display:flex; align-items: center; font-size: 30px;">메뉴자리</div>
        <div style="width: 200px; background-color: yellow; display:flex; align-items: center; font-size: 20px;">로그인자리</div>
    </header>
</div>

<div style=" width: 100%; display: flex; margin-bottom: 50px; border-bottom: 1px solid #ccc;">
    <header style="width: 100%; max-width: 1200px; margin: 0 auto; height: 80px; display: flex; justify-content: space-between;">
        <div style="width: 150px; background-color: red; display:flex; align-items: center; font-size: 20px;">로고자리</div>
        <div style="flex-grow: 2; background-color: blue; display:flex; align-items: center; font-size: 30px;">메뉴자리01</div>
        <div style="flex-grow: 1; background-color: #6565b3; display:flex; align-items: center; font-size: 30px;">메뉴자리02</div>
        <div style="width: 200px; background-color: yellow; display:flex; align-items: center; font-size: 20px;">로그인자리</div>
    </header>
</div>

<!--
    자식이 부모보다 사이즈가 크면 flex를 주게 되면 부모에 맞춰서 비율로 가져간다
    높이도 자동으로 부모의 높이를 따른다.
 -->
<div style=" width: 100%; display: flex; margin-bottom: 50px; border-bottom: 1px solid #ccc;">
    <header style="width: 100%; max-width: 1200px; margin: 0 auto; height: 80px; display: flex; justify-content: space-between;">
        <div style="width: 800px; background-color: red; display:flex; align-items: center; font-size: 20px;">로고자리</div>
        <div style="width: 800px; background-color: blue; display:flex; align-items: center; font-size: 30px;">메뉴자리</div>
        <div style="width: 200px; background-color: yellow; display:flex; align-items: center; font-size: 20px;">로그인자리</div>
    </header>
</div>

<!--
    자식에게 높이 값을 주지 않으면 부모의 높이 값을 받는다
    자식에게 높이 값을 주면 그것은 존중한다.
    단 가로 정렬 일때
    자식에게 여백을 줄때 부모에게 gap
    flex-wrap : wrap; 줄바꿈 해주겠다 자식의 width 값을 존중해준다.
    row-gap : 가로
    column-gap : 세로
 -->

<div style="width : 100%; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
    <div style="width: 300px; height: 300px; border-radius: 20px; background-color: #aaa;">Card</div>
    <div style="width: 300px; height: 300px; border-radius: 20px; background-color: #aaa;">Card</div>
    <div style="width: 300px; height: 300px; border-radius: 20px; background-color: #aaa;">Card</div>
    <div style="width: 300px; height: 300px; border-radius: 20px; background-color: #aaa;">Card</div>
    <div style="width: 300px; height: 300px; border-radius: 20px; background-color: #aaa;">Card</div>
    <div style="width: 300px; height: 300px; border-radius: 20px; background-color: #aaa;">Card</div>
    <div style="width: 300px; height: 300px; border-radius: 20px; background-color: #aaa;">Card</div>
    <div style="width: 300px; height: 300px; border-radius: 20px; background-color: #aaa;">Card</div>
    <div style="width: 300px; height: 300px; border-radius: 20px; background-color: #aaa;">Card</div>
    <div style="width: 300px; height: 300px; border-radius: 20px; background-color: #aaa;">Card</div>
</div>

<!--
    flex-direction: column; 세로가 되면서 justify-content: 세로로 정렬
    부모만큼 늘어나야 할때 flex-direction을 많이 사용함
    펼침메뉴에 많이 사용함
-->
<div style="width : 100%; display: flex; flex-direction: column;">
    <div style="border-radius: 20px; background-color: #aaa;">Card</div>
    <div style="border-radius: 20px; background-color: #aaa;">Card</div>
    <div style="border-radius: 20px; background-color: #aaa;">Card</div>
    <div style="border-radius: 20px; background-color: #aaa;">Card</div>
</div>

</body>
</html>
